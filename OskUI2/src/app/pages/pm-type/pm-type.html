<app-blank title="Personel Hareket Türleri">
  <app-section title="Tür Listesi">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:1rem;">
      <button data-toggle="modal" data-target="#addPmTypeModal" class="btn btn-sm btn-dark">
        <i class="fas fa-plus"></i> Yeni Tür Ekle
      </button>
      <input pInputText #globalFilter placeholder="Ara..." type="text" (input)="onGlobalFilter($event)" style="max-width:280px;" />
    </div>

    <p-table #dt [value]="pmTypes" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[5,10,20]" 
      [sortMode]="'multiple'" [responsiveLayout]="'scroll'" 
      styleClass="p-datatable-sm fontstil13"
      [globalFilterFields]="['name', 'description']">
      
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">Adı <p-sortIcon field="name"></p-sortIcon></th>
          <th pSortableColumn="description">Açıklama <p-sortIcon field="description"></p-sortIcon></th>
          <th pSortableColumn="order" style="width: 80px">Sıra <p-sortIcon field="order"></p-sortIcon></th>
          <th style="width: 100px; text-align: center">Personel</th>
          <th style="width: 100px; text-align: center">Yönetici</th>
          <th style="width: 120px; text-align: center">Başlangıç Öncesi</th>
          <th style="width: 100px; text-align: center">Faaliyet2</th>
          <th style="width: 100px; text-align: center">Tek Statü</th>
          <th pSortableColumn="statusQuota" style="width: 80px">Kota <p-sortIcon field="statusQuota"></p-sortIcon></th>
          <th style="width: 100px; text-align: right">İşlemler</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-item>
        <tr>
          <td>{{ item.name }}</td>
          <td>{{ item.description }}</td>
          <td style="text-align: center">{{ item.order }}</td>
          <td style="text-align: center">
            <i class="fas" [ngClass]="item.isUsingStaff ? 'fa-check-circle text-success' : 'fa-times-circle text-danger'"></i>
          </td>
          <td style="text-align: center">
            <i class="fas" [ngClass]="item.isManager ? 'fa-check-circle text-success' : 'fa-times-circle text-danger'"></i>
          </td>
          <td style="text-align: center">
            <i class="fas" [ngClass]="item.isBeforeStartStaff ? 'fa-check-circle text-success' : 'fa-times-circle text-danger'"></i>
          </td>
          <td style="text-align: center">
            <i class="fas" [ngClass]="item.isFaaliyet2Control ? 'fa-check-circle text-success' : 'fa-times-circle text-danger'"></i>
          </td>
          <td style="text-align: center">
            <i class="fas" [ngClass]="item.isOnlyOneStatu ? 'fa-check-circle text-success' : 'fa-times-circle text-danger'"></i>
          </td>
          <td style="text-align: center">{{ item.statusQuota }}</td>
          <td style="text-align: right">
            <app-grup-menu-component>
              <a (click)="Edit(item)" data-toggle="modal" data-target="#editPmTypeModal" class="dropdown-item pointer fontstil13" style="padding: 6px 12px; border-bottom: 1px solid #eee;">
                <i style="width: 18px" class="fas fa-edit text-primary"></i>
                Düzenle
              </a>
              <a (click)="Delete(item.id)" class="dropdown-item pointer fontstil13" style="padding: 6px 12px;">
                <i style="width: 18px" class="fas fa-trash text-danger"></i>
                Sil
              </a>
            </app-grup-menu-component>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="10">Kayıt bulunamadı.</td>
        </tr>
      </ng-template>
    </p-table>
  </app-section>
</app-blank>

<app-modal name="addPmTypeModal" title="Yeni Hareket Türü">
  <form #addForm="ngForm" (ngSubmit)="Add(addForm)">
    <div class="row">
      <div class="col-md-8 form-group mb-2">
        <label>Adı</label>
        <input type="text" class="form-control" name="name" [(ngModel)]="newPmType.name" required>
      </div>
      <div class="col-md-4 form-group mb-2">
        <label>Listeleme Sırası</label>
        <input type="number" class="form-control" name="order" [(ngModel)]="newPmType.order">
      </div>
    </div>

    <div class="form-group mb-2">
      <label>Açıklama</label>
      <input type="text" class="form-control" name="description" [(ngModel)]="newPmType.description">
    </div>

    <div class="row mt-3">
      <div class="col-md-6 form-group mb-2">
        <div class="custom-control custom-checkbox">
          <input type="checkbox" class="custom-control-input" id="isUsingStaffAdd" name="isUsingStaff" [(ngModel)]="newPmType.isUsingStaff">
          <label class="custom-control-label" for="isUsingStaffAdd">Personel Kullanır mı?</label>
        </div>
      </div>
      <div class="col-md-6 form-group mb-2">
        <div class="custom-control custom-checkbox">
          <input type="checkbox" class="custom-control-input" id="isManagerAdd" name="isManager" [(ngModel)]="newPmType.isManager">
          <label class="custom-control-label" for="isManagerAdd">Yönetici mi?</label>
        </div>
      </div>
      <div class="col-md-6 form-group mb-2 mt-2">
        <div class="custom-control custom-checkbox">
          <input type="checkbox" class="custom-control-input" id="isBeforeStartStaffAdd" name="isBeforeStartStaff" [(ngModel)]="newPmType.isBeforeStartStaff">
          <label class="custom-control-label" for="isBeforeStartStaffAdd">Başlangıç Öncesi mi?</label>
        </div>
      </div>
      <div class="col-md-6 form-group mb-2 mt-2">
        <div class="custom-control custom-checkbox">
          <input type="checkbox" class="custom-control-input" id="isFaaliyet2ControlAdd" name="isFaaliyet2Control" [(ngModel)]="newPmType.isFaaliyet2Control">
          <label class="custom-control-label" for="isFaaliyet2ControlAdd">Faaliyet2 Kontrol?</label>
        </div>
      </div>
      <div class="col-md-6 form-group mb-2 mt-2">
        <div class="custom-control custom-checkbox">
          <input type="checkbox" class="custom-control-input" id="isOnlyOneStatuAdd" name="isOnlyOneStatu" [(ngModel)]="newPmType.isOnlyOneStatu">
          <label class="custom-control-label" for="isOnlyOneStatuAdd">Tek Statü mü?</label>
        </div>
      </div>
      <div class="col-md-6 form-group mb-2 mt-2">
        <label>Statü Kotası</label>
        <input type="number" class="form-control" name="statusQuota" [(ngModel)]="newPmType.statusQuota">
      </div>
    </div>

    <hr>
    <div class="text-right d-flex justify-content-end gap-2 mt-2">
      <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">İptal</button>
      <button type="submit" class="btn btn-primary btn-sm" [disabled]="!addForm.valid">
        <i class="fa fa-save"></i> Kaydet
      </button>
    </div>
  </form>
</app-modal>

<app-modal name="editPmTypeModal" title="Hareket Türü Düzenle">
  <form #editForm="ngForm" (ngSubmit)="Update(editForm)">
    <div class="row">
      <div class="col-md-8 form-group mb-2">
        <label>Adı</label>
        <input type="text" class="form-control" name="name" [(ngModel)]="updatePmType.name" required>
      </div>
      <div class="col-md-4 form-group mb-2">
        <label>Listeleme Sırası</label>
        <input type="number" class="form-control" name="order" [(ngModel)]="updatePmType.order">
      </div>
    </div>

    <div class="form-group mb-2">
      <label>Açıklama</label>
      <input type="text" class="form-control" name="description" [(ngModel)]="updatePmType.description">
    </div>

    <div class="row mt-3">
      <div class="col-md-6 form-group mb-2">
        <div class="custom-control custom-checkbox">
          <input type="checkbox" class="custom-control-input" id="isUsingStaffEdit" name="isUsingStaff" [(ngModel)]="updatePmType.isUsingStaff">
          <label class="custom-control-label" for="isUsingStaffEdit">Personel Kullanır mı?</label>
        </div>
      </div>
      <div class="col-md-6 form-group mb-2">
        <div class="custom-control custom-checkbox">
          <input type="checkbox" class="custom-control-input" id="isManagerEdit" name="isManager" [(ngModel)]="updatePmType.isManager">
          <label class="custom-control-label" for="isManagerEdit">Yönetici mi?</label>
        </div>
      </div>
      <div class="col-md-6 form-group mb-2 mt-2">
        <div class="custom-control custom-checkbox">
          <input type="checkbox" class="custom-control-input" id="isBeforeStartStaffEdit" name="isBeforeStartStaff" [(ngModel)]="updatePmType.isBeforeStartStaff">
          <label class="custom-control-label" for="isBeforeStartStaffEdit">Başlangıç Öncesi mi?</label>
        </div>
      </div>
      <div class="col-md-6 form-group mb-2 mt-2">
        <div class="custom-control custom-checkbox">
          <input type="checkbox" class="custom-control-input" id="isFaaliyet2ControlEdit" name="isFaaliyet2Control" [(ngModel)]="updatePmType.isFaaliyet2Control">
          <label class="custom-control-label" for="isFaaliyet2ControlEdit">Faaliyet2 Kontrol?</label>
        </div>
      </div>
      <div class="col-md-6 form-group mb-2 mt-2">
        <div class="custom-control custom-checkbox">
          <input type="checkbox" class="custom-control-input" id="isOnlyOneStatuEdit" name="isOnlyOneStatu" [(ngModel)]="updatePmType.isOnlyOneStatu">
          <label class="custom-control-label" for="isOnlyOneStatuEdit">Tek Statü mü?</label>
        </div>
      </div>
      <div class="col-md-6 form-group mb-2 mt-2">
        <label>Statü Kotası</label>
        <input type="number" class="form-control" name="statusQuota" [(ngModel)]="updatePmType.statusQuota">
      </div>
    </div>

    <hr>
    <div class="text-right d-flex justify-content-end gap-2 mt-2">
      <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">İptal</button>
      <button type="submit" class="btn btn-primary btn-sm" [disabled]="!editForm.valid">
        <i class="fa fa-save"></i> Güncelle
      </button>
    </div>
  </form>
</app-modal>
