<app-blank title="Roller">
  <app-section title="Rol Listesi">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:1rem;">
      <button (click)="ResetForm()" data-toggle="modal" data-target="#roleAddModal" class="btn btn-sm btn-dark">
        <i class="fas fa-plus"></i> Yeni Rol
      </button>
      <input pInputText #globalFilter placeholder="Global filter" type="text" (input)="onGlobalFilter($event)" style="max-width:280px;" />
    </div>

    <p-table #dt [value]="roles" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10,20,50]"
      [sortMode]="'multiple'" [responsiveLayout]="'scroll'" [globalFilterFields]="['name']" exportFilename="roles">
      
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">Rol Adı <p-sortIcon field="name"></p-sortIcon></th>
          <th>İşlemler</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-role>
        <tr>
          <td>{{ role.name }}</td>
          <td>
            <div class="d-flex gap-2">
              <button (click)="Edit(role)" data-toggle="modal" data-target="#roleEditModal" class="btn btn-sm btn-outline-primary" title="Düzenle">
                <i class="fas fa-edit"></i>
              </button>
              <button (click)="Delete(role.id)" class="btn btn-sm btn-outline-danger" title="Sil">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr><td colspan="2">Kayıt bulunamadı.</td></tr>
      </ng-template>
    </p-table>
  </app-section>
</app-blank>

<app-modal name="roleAddModal" title="Yeni Rol Ekle">
  <form #addForm="ngForm" (ngSubmit)="Add(addForm)">
    <div class="form-group mb-2">
      <label>Rol Adı</label>
      <input type="text" class="form-control" name="name" [(ngModel)]="createModel.name" required>
    </div>
    <hr>
    <div class="text-right d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">İptal</button>
      <button type="submit" class="btn btn-primary btn-sm" [disabled]="!addForm.valid">
        <i class="fa fa-save"></i> Kaydet
      </button>
    </div>
  </form>
</app-modal>

<app-modal name="roleEditModal" title="Rol Düzenle">
  <form #editForm="ngForm" (ngSubmit)="Update(editForm)">
    <div class="form-group mb-2">
      <label>Rol Adı</label>
      <input type="text" class="form-control" name="updName" [(ngModel)]="updateModel.name" required>
    </div>
    <hr>
    <div class="text-right d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">İptal</button>
      <button type="submit" class="btn btn-primary btn-sm" [disabled]="!editForm.valid">
        <i class="fa fa-save"></i> Güncelle
      </button>
    </div>
  </form>
</app-modal>
