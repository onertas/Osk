<app-blank title="Ünvanlar">
  <app-section title="Ünvan Listesi">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
      <button data-toggle="modal" data-target="#addTitleModal" class="btn btn-sm btn-dark">
        <i class="fas fa-plus"></i> Yeni Ünvan
      </button>
      <input pInputText #globalFilter placeholder="Global filter" type="text" (input)="onGlobalFilter($event)"
        style="max-width:280px;" />
    </div>
    <p-table styleClass="p-datatable-sm fontstil13" #dt [value]="titles" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10,20,50]" [sortMode]="'multiple'" [responsiveLayout]="'scroll'" [globalFilterFields]="['name']" exportFilename="titles">
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">Ünvan Adı <p-sortIcon field="name"></p-sortIcon></th>
          <th style="text-align: right">İşlemler</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-title>
        <tr>
          <td>{{ title.name }}</td>
          <td style="text-align: right">
            <app-grup-menu-component>
              <a (click)="Edit(title)" data-toggle="modal" data-target="#editTitleModal" class="dropdown-item pointer fontstil13" style="padding: 6px 12px; border-bottom: 1px solid #eee;">
                <i style="width: 18px" class="fas fa-edit text-primary"></i>
                Düzenle
              </a>
              <a (click)="Delete(title.id)" class="dropdown-item pointer fontstil13" style="padding: 6px 12px;">
                <i style="width: 18px" class="fas fa-trash text-danger"></i>
                Sil
              </a>
            </app-grup-menu-component>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="2">Kayıt bulunamadı.</td>
        </tr>
      </ng-template>
    </p-table>
  </app-section>
</app-blank>

<app-modal name="addTitleModal" title="Yeni Ünvan Ekle">
  <form #addForm="ngForm" (ngSubmit)="Add(addForm)">
    <div class="form-group mb-2">
      <label>Ünvan Adı</label>
      <input type="text" class="form-control" name="name" [(ngModel)]="newTitle.name" required>
    </div>
    <hr>
    <div class="text-right d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">İptal</button>
      <button type="submit" class="btn btn-primary btn-sm" [disabled]="!addForm.valid"><i class="fa fa-save"></i> Kaydet</button>
    </div>
  </form>
</app-modal>

<app-modal name="editTitleModal" title="Ünvan Düzenle">
  <form #editForm="ngForm" (ngSubmit)="Update(editForm)">
    <div class="form-group mb-2">
      <label>Ünvan Adı</label>
      <input type="text" class="form-control" name="name" [(ngModel)]="updateTitle.name" required>
    </div>
    <hr>
    <div class="text-right d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">İptal</button>
      <button type="submit" class="btn btn-primary btn-sm" [disabled]="!editForm.valid"><i class="fa fa-save"></i> Güncelle</button>
    </div>
  </form>
</app-modal>
