
<app-blank title="Personel">
  <app-section title="Personel Listesi">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:1rem;">
  <button (click)="ResetForm()" data-toggle="modal" data-target="#acAdd" class="btn btn-sm btn-dark"><i class="fas fa-plus"></i> Yeni
    Personel</button>
  <input pInputText #globalFilter placeholder="Global filter" type="text" (input)="onGlobalFilter($event)"
    style="max-width:280px;" />
</div>
<p-table styleClass="p-datatable-sm fontstil13" #dt [value]="personnel" [paginator]="true" [rows]="5" [rowsPerPageOptions]="[5,10,20]" 
[sortMode]="'multiple'"
  [responsiveLayout]="'scroll'" [globalFilterFields]="['firstName','lastName','email','phone']"
  exportFilename="personnel">
  <ng-template pTemplate="header">
    <tr>
      <th pSortableColumn="firstName">Adı <p-sortIcon field="firstName"></p-sortIcon></th>
      <th pSortableColumn="lastName">Soyadı <p-sortIcon field="lastName"></p-sortIcon></th>
      <th pSortableColumn="email">E-posta <p-sortIcon field="email"></p-sortIcon></th>
      <th pSortableColumn="phoneNumber">Telefon <p-sortIcon field="phoneNumber"></p-sortIcon></th>
      <th pSortableColumn="title">Ünvan <p-sortIcon field="title"></p-sortIcon></th>
      <th pSortableColumn="branches">Branş <p-sortIcon field="branches"></p-sortIcon></th>
      <th>İşlemler</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-person>
    <tr>
      <td>{{ person.firstName }}</td>
      <td>{{ person.lastName }}</td>
      <td>{{ person.email }}</td>
      <td>{{ person.phoneNumber }}</td>
      <td>{{ person.title }}</td>
      <td>{{ person.branches.join(', ') }}</td>
      <td style="text-align: right">
        <app-grup-menu-component>
          <a (click)="Edit(person)" data-toggle="modal" data-target="#acEdit" class="dropdown-item pointer fontstil13" style="padding: 6px 12px; border-bottom: 1px solid #eee;">
            <i style="width: 18px" class="fas fa-edit text-primary"></i>
            Düzenle
          </a>
          <a (click)="Delete(person.id)" class="dropdown-item pointer fontstil13" style="padding: 6px 12px;">
            <i style="width: 18px" class="fas fa-trash text-danger"></i>
            Sil
          </a>
        </app-grup-menu-component>
      </td>
    </tr>
  </ng-template>

  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="7">No personnel found.</td>
    </tr>
  </ng-template>
</p-table>
  </app-section>
</app-blank>



<app-modal name="acAdd" title="Yeni Personel Ekle">
  <form #addForm="ngForm" (ngSubmit)="Add(addForm)">
    <div class="row">
      <div class="col-md-6 form-group mb-2">
        <label>Kimlik Numarası</label>
        <input type="text" class="form-control" name="identityNumber" [(ngModel)]="newPersonnel.identityNumber"
          required>
      </div>
      <div class="col-md-6 form-group mb-2">
        <label>Telefon Numarası</label>
        <p-inputMask mask="(999) 999-9999" [(ngModel)]="newPersonnel.phoneNumber" name="phoneNumber"
          placeholder="(555) 555-5555" styleClass="form-control w-100"></p-inputMask>
      </div>
    </div>
    <div class="row">
      <div class="col-md-6 form-group mb-2">
        <label>Ad</label>
        <input type="text" class="form-control" name="firstName" [(ngModel)]="newPersonnel.firstName" required>
      </div>
      <div class="col-md-6 form-group mb-2">
        <label>Soyad</label>
        <input type="text" class="form-control" name="lastName" [(ngModel)]="newPersonnel.lastName" required>
      </div>
    </div>
    <div class="form-group mb-2">
      <label>Email</label>
      <input type="email" class="form-control" name="email" [(ngModel)]="newPersonnel.email" required>
    </div>
    <div class="form-group mb-2">
      <label>Branşlar</label>
      <p-multiSelect [options]="branches" [(ngModel)]="newPersonnel.personnelBranches" optionLabel="name" 
      optionValue="id" name="branches" placeholder="Branş Seçin" styleClass="w-100"></p-multiSelect>
    </div>
    <div class="form-group mb-2 mt-3 form-check">
      <input type="checkbox" class="form-check-input" id="isBanned" name="isBanned" [(ngModel)]="newPersonnel.isBanned">
      <label class="form-check-label" for="isBanned">Yasaklı mı?</label>
    </div>

    <hr>
    <div class="text-right d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">İptal</button>
      <button type="submit" class="btn btn-primary btn-sm" [disabled]="!addForm.valid"><i class="fa fa-save"></i>
        Kaydet</button>
    </div>
  </form>
</app-modal>

<app-modal name="acEdit" title="Personel Düzenle">
  <form #editForm="ngForm" (ngSubmit)="Update(editForm)">
    <div class="row">
      <div class="col-md-6 form-group mb-2">
        <label>Kimlik Numarası</label>
        <input type="text" class="form-control" name="updIdentityNumber" [(ngModel)]="updatePersonnelModel.identityNumber"
          required>
      </div>
      <div class="col-md-6 form-group mb-2">
        <label>Telefon Numarası</label>
        <p-inputMask mask="(999) 999-9999" [(ngModel)]="updatePersonnelModel.phoneNumber" name="updPhoneNumber"
          placeholder="(555) 555-5555" styleClass="form-control w-100"></p-inputMask>
      </div>
    </div>
    <div class="row">
      <div class="col-md-6 form-group mb-2">
        <label>Ad</label>
        <input type="text" class="form-control" name="updFirstName" [(ngModel)]="updatePersonnelModel.firstName" required>
      </div>
      <div class="col-md-6 form-group mb-2">
        <label>Soyad</label>
        <input type="text" class="form-control" name="updLastName" [(ngModel)]="updatePersonnelModel.lastName" required>
      </div>
    </div>
    <div class="form-group mb-2">
      <label>Email</label>
      <input type="email" class="form-control" name="updEmail" [(ngModel)]="updatePersonnelModel.email" required>
    </div>
    <div class="form-group mb-2">
      <label>Branşlar</label>
      <p-multiSelect [options]="branches" [(ngModel)]="updatePersonnelModel.personnelBranches" optionLabel="name" 
      optionValue="id" name="updBranches" placeholder="Branş Seçin" styleClass="w-100"></p-multiSelect>
    </div>
    <div class="form-group mb-2 mt-3 form-check">
      <input type="checkbox" class="form-check-input" id="updIsBanned" name="updIsBanned" [(ngModel)]="updatePersonnelModel.isBanned">
      <label class="form-check-label" for="updIsBanned">Yasaklı mı?</label>
    </div>

    <hr>
    <div class="text-right d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">İptal</button>
      <button type="submit" class="btn btn-primary btn-sm" [disabled]="!editForm.valid"><i class="fa fa-save"></i>
        Güncelle</button>
    </div>
  </form>
</app-modal>
